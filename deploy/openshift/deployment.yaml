apiVersion: apps/v1
kind: Deployment
metadata:
  name: sankey-scorecard
  labels:
    app: sankey-scorecard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sankey-scorecard
      component: app
  template:
    metadata:
      labels:
        app: sankey-scorecard
        component: app
    spec:
      volumes:
        - name: sankey-scorecard-config
          configMap:
            name: sankey-scorecard-config
      containers:
        - name: sankey-scorecard
          image: image-registry.openshift-image-registry.svc:5000/${NAMESPACE}/sankey-scorecard:latest
          args: ["serve", "--jira-url", "$(JIRA_URL)"]
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: sankey-scorecard-config
              mountPath: /etc/sankey-scorecard
              readOnly: true
          env:
            - name: JIRA_URL
              valueFrom:
                secretKeyRef:
                  name: sankey-scorecard-jira
                  key: jira-url
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sankey-scorecard-jira
                  key: api-token
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sankey-scorecard-db
                  key: database-url
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
